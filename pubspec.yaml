name: emotai
description: "Emotion-based AI support application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^2.30.0
  firebase_auth: ^4.16.0
  firebase_database: ^10.5.7
  cloud_firestore: ^4.17.0
  google_sign_in: ^6.2.1

  # Local Storage
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Camera & ML
  camera: ^0.11.3
  google_mlkit_face_detection: ^0.13.1
  google_mlkit_commons: ^0.11.0
  image: ^4.2.0

  # Notifications (Android 13+ compatible)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Networking
  http: ^1.6.0
  mailer: ^6.1.0

  # Sharing
  share_plus: ^7.2.2

  # UI
  cupertino_icons: ^1.0.8
  
  #timer
  android_intent_plus: ^5.0.2
  url_launcher: ^6.3.2

  fl_chart: ^0.66.0

  firebase_messaging: ^14.7.10

  speech_to_text: 7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true